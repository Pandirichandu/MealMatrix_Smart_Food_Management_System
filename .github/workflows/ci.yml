name: SaveServe CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout latest code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ✅ Setup Node.js (FIXED version)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # ✅ Install dependencies (faster & reliable)
    - name: Install Dependencies
      run: npm ci

    # ✅ Lint check
    - name: Lint
      run: npm run lint

    # ✅ Build frontend (Next.js / React)
    - name: Build Frontend
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1

    # ✅ Backend test / validation
    - name: Test (Backend)
      run: |
        echo "Running Tests..."
        node server/check_integrity.js

    # ✅ Deployment (placeholder)
    - name: Deploy
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deploying to production server..."
        # 👉 Add real deployment here
        # Example (Vercel):
        # npx vercel --prod
