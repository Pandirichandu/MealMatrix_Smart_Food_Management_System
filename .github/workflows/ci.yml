name: SaveServe CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build Frontend
      run: npm run build
      env:
        # Avoid treating lint warnings as errors during build for this demo, 
        # normally you'd want this strict.
        NEXT_TELEMETRY_DISABLED: 1

    - name: Test (Backend)
      # Assuming we had proper tests in server/tests, we would run them here.
      # using a dummy command as per project status
      run: echo "Running Tests..." && node server/check_integrity.js

    - name: Deploy
      if: github.ref == 'refs/heads/main'
      run: echo "Deploying to production server..."
      # Add actual deployment steps here (e.g. SSH, Heroku, Vercel)
      # For Vercel: npx vercel --prod
